name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Checks on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test tools
        run: python -m pip install -e ".[test,lint,disasm]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: Smoke CLI
        run: |
          traceforge --version
          python -c "from pathlib import Path; Path('sample.bin').write_bytes(b'demo http://example.com 10.0.0.1\n')"
          traceforge scan sample.bin
          traceforge index .traceforge/cases
          traceforge db build .traceforge/cases
          traceforge rules sample.bin

  package:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and source archive
        run: |
          python -m pip install build
          python -m build

      - name: Install built wheel
        run: |
          python -m pip install dist/*.whl
          traceforge --version
